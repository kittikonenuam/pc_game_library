<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>➕ เพิ่มเกม — GameVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:   #050711;
      --bg-card:   #0c1120;
      --accent1:   #00f0ff;
      --accent2:   #ff2d78;
      --accent3:   #a855f7;
      --text-main: #e8eaf6;
      --text-muted:#6b7280;
      --border:    rgba(0,240,255,.18);
      --glow1:     0 0 20px rgba(0,240,255,.4);
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-deep);
      color: var(--text-main);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 70% 55% at 30% 0%,   rgba(0,240,255,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(168,85,247,.12) 0%, transparent 55%);
      display: flex; flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(18px);
      background: rgba(5,7,17,.72);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2.5rem;
      display: flex; align-items: center; gap: 1.2rem;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: .4rem;
      font-family: 'Orbitron', monospace; font-size: .72rem;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.1);
      padding: .4rem .9rem; border-radius: 6px;
      transition: color .2s, border-color .2s;
    }
    .back-btn:hover { color: var(--accent1); border-color: var(--accent1); }
    .page-title {
      font-family: 'Orbitron', monospace; font-weight: 900; font-size: 1.1rem;
      background: linear-gradient(90deg, var(--accent1), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ── FORM WRAPPER ── */
    .form-wrapper {
      flex: 1;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 3rem 1.5rem;
    }

    .form-card {
      width: 100%; max-width: 560px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.2rem 2.4rem;
      position: relative;
      overflow: hidden;
    }
    .form-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent1), var(--accent3), var(--accent2));
    }

    .form-header { margin-bottom: 2rem; }
    .form-header h2 {
      font-family: 'Orbitron', monospace; font-size: 1.25rem; font-weight: 900;
      color: var(--text-main);
    }
    .form-header p { color: var(--text-muted); font-size: .92rem; margin-top: .3rem; }

    /* ── FIELDS ── */
    .field { margin-bottom: 1.3rem; }
    .field label {
      display: block;
      font-size: .82rem; font-weight: 600; letter-spacing: 1px;
      color: var(--accent1);
      margin-bottom: .45rem;
      text-transform: uppercase;
    }
    .field input,
    .field select {
      width: 100%;
      padding: .7rem 1rem;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      color: var(--text-main);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus,
    .field select:focus {
      border-color: var(--accent1);
      box-shadow: 0 0 0 3px rgba(0,240,255,.12);
    }
    .field select option { background: #0c1120; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    /* ── PREVIEW ── */
    .img-preview {
      margin-top: .6rem;
      width: 100%; height: 130px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--border);
      display: none;
    }

    /* ── SUBMIT ── */
    .btn-submit {
      width: 100%; padding: .85rem;
      margin-top: .5rem;
      font-family: 'Orbitron', monospace; font-size: .85rem; font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent1), var(--accent3));
      color: #050711;
      border: none; border-radius: 8px;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: var(--glow1);
    }
    .btn-submit:active { transform: translateY(0); }

    body::after {
      content: '';
      pointer-events: none;
      position: fixed; inset: 0; z-index: 999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
    }
  </style>
</head>
<body>

<header>
  <a href="{{ url_for('index') }}" class="back-btn">← BACK</a>
  <div class="page-title">ADD GAME</div>
</header>

<div class="form-wrapper">
  <div class="form-card">
    <div class="form-header">
      <h2>➕ เพิ่มเกมใหม่</h2>
      <p>กรอกข้อมูลเกมที่ต้องการเพิ่มลงคลัง</p>
    </div>

    <form method="POST" action="{{ url_for('append') }}">

      <div class="field">
        <label>🎮 ชื่อเกม *</label>
        <input type="text" name="name" placeholder="เช่น Elden Ring, Stardew Valley…" required/>
      </div>

      <div class="row-2">
        <div class="field">
          <label>💰 ราคา (บาท)</label>
          <input type="number" name="price" placeholder="0" min="0" step="0.01" value="0"/>
        </div>
        <div class="field">
          <label>👥 ผู้เล่นสูงสุด</label>
          <input type="number" name="max_players" placeholder="1" min="1" value="1"/>
        </div>
      </div>

      <div class="field">
        <label>🏷️ หมวดหมู่</label>
        <select name="genre_id">
          <option value="">— ไม่ระบุ —</option>
          {% for genre in genres %}
            <option value="{{ genre['id'] }}">{{ genre['name'] }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="field">
        <label>🖼️ URL รูปปก</label>
        <input type="url" name="image" id="imgUrl" placeholder="https://…"
               oninput="previewImg(this.value)"/>
        <img id="preview" class="img-preview" alt="preview"/>
      </div>

      <button type="submit" class="btn-submit">🚀 SAVE GAME</button>
    </form>
  </div>
</div>

<script>
  function previewImg(url) {
    const img = document.getElementById('preview');
    if (url) {
      img.src = url;
      img.style.display = 'block';
      img.onerror = () => img.style.display = 'none';
    } else {
      img.style.display = 'none';
    }
  }
</script>
</body>
</html>
